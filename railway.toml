# ==========================================
# INSTRUÇÕES DE DEPLOY NO RAILWAY
# ==========================================
# 1. Acesse https://railway.app e crie uma conta gratuita
# 2. Clique em "New Project" → "Deploy from GitHub repo"
# 3. Selecione este repositório
# 4. O Railway detectará automaticamente que é um projeto Node.js
# 5. Configure as variáveis de ambiente na aba "Variables":
#    - WHATSAPP_TOKEN
#    - PHONE_NUMBER_ID
#    - WABA_ID
#    - PUBLIC_URL (use a URL gerada pelo Railway)
# 6. Aguarde o deploy automático
# 7. Acesse sua aplicação pela URL fornecida pelo Railway

