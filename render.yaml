services:
  # Serviço Web Principal
  - type: web
    name: refugio-laguna-crm
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 3011
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: WABA_ID
        sync: false
      - key: VERIFY_TOKEN
        value: ragazzi_verify_2026
      - key: PUBLIC_URL
        sync: false
      - key: ADMIN_USER
        value: Ragazzi
      - key: ADMIN_PASS
        value: Operador01
    disk:
      name: sqlite-data
      mountPath: /workspace/database
      sizeGB: 1
    healthCheckPath: /api/health
